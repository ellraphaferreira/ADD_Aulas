const agrupado = vendas.reduce((acc, venda) => {
  const existente = acc.find(item => item.categoria === venda.categoria);

  if (existente) {
    existente.total += venda.quantidade;
  } else {
    acc.push({
      categoria: venda.categoria,
      total: venda.quantidade
    });
  }

  return acc;
}, []);

console.log(agrupado)


    const ctx = document.getElementById('myChart');
  
    new Chart(ctx, {
      type: 'bar',
      
      data: {
        labels: agrupado.map((p) => {
            return p.categoria
        }),
        datasets: [{
          label: 'Valor:',
          data: agrupado.map((p) => {
            return p.total
        }),
          borderWidth: 1
        }]
      },
      options: {
        scales: {
          y: {
            beginAtZero: true
          }
        }
      }
    });
  </script>
