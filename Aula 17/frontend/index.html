<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD - ANALISE</title>
</head>
<body>
    <form id="form">
        <input type="text" placeholder="nome" id="nome">
        <input type="email" placeholder="email" id="email">
        <input type="password" placeholder="senha" id="senha">
        <button type="submit">Registrar</button>
    </form>

    <br>
    <br>
    <br>

    <form id="formatt">
        <input type="text" id="idatt" disabled>
        <input type="text" placeholder="nome" id="nomeatt">
        <input type="email" placeholder="email" id="emailatt">
        <input type="password" placeholder="senha" id="senhaatt">
        <button type="submit">Atualizar</button>
    </form>

    <br>
    <br>
    <br>

    <table border="1">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="listaUsuarios">
            <!-- O conteúdo da tabela virá aqui: Nome, email  -->
        </tbody>
    </table>

    <script src="scripts/index.js"></script>
</body>
</html>
