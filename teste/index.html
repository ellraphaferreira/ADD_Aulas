<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tela de Cadastro</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    button {
      padding: 12px 20px;
      border: none;
      background: #4a90e2;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #357abd;
    }

    /* Fundo escuro */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);

      justify-content: center;
      align-items: center;
    }

    /* Caixa do cadastro */
    .modal-content {
      background: white;
      padding: 25px;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    .modal-content h2 {
      margin-bottom: 15px;
      text-align: center;
    }

    .modal-content input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .close {
      float: right;
      cursor: pointer;
      font-size: 20px;
      color: #666;
    }

    .close:hover {
      color: red;
    }
  </style>
</head>
<body>

  <!-- Botão -->
  <button id="abrirCadastro">
    Abrir Cadastro
  </button>

  <!-- Modal -->
  <div class="modal" id="modalCadastro">
    <div class="modal-content">
      <span class="close" id="fechar">&times;</span>

      <h2>Cadastro</h2>

      <input type="text" placeholder="Nome">
      <input type="email" placeholder="E-mail">
      <input type="password" placeholder="Senha">

      <button>Cadastrar</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
